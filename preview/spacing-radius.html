<!DOCTYPE html>
<!-- @dsCard group="Spacing" name="Spacing & Radius" subtitle="4px scale + zero radius" viewport="700x310" -->
<html>
<head>
<meta charset="UTF-8">
<style>
  
@font-face{font-family:'Geist Mono';src:url('../fonts/GeistMono-VariableFont_wght.ttf') format('truetype-variations');font-weight:100 900;font-style:normal;font-display:swap}
@font-face{font-family:'Red Hat Mono';src:url('../fonts/RedHatMono-VariableFont_wght.ttf') format('truetype-variations');font-weight:300 700;font-style:normal;font-display:swap}
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #000; padding: 18px; font-family: 'Geist Mono','Geist Mono','Red Hat Mono',monospace; }
  .grid { display: flex; flex-direction: column; gap: 6px; }
  .row { display: flex; align-items: center; gap: 12px; }
  .label { font-size: 9px; letter-spacing: 0.15em; text-transform: uppercase; color: rgba(255,255,255,0.35); width: 56px; text-align: right; flex-shrink: 0; }
  .val { font-size: 9px; color: rgba(255,255,255,0.25); width: 36px; flex-shrink: 0; }
  .track { flex: 1; height: 16px; background: #111110; border: 1px solid rgba(255,255,255,0.12); }
  .fill { height: 100%; background: #eaff00; }
  .section { font-size: 9px; letter-spacing: 0.22em; text-transform: uppercase; color: rgba(255,255,255,0.3); padding: 8px 0 2px; }
  .section:first-child { padding-top: 0; }

  /* Border radius demo */
  .radii { display: flex; gap: 12px; margin-top: 4px; }
  .radius-demo { width: 56px; height: 56px; background: #1a1a18; border: 1px solid rgba(255,255,255,0.22); color: rgba(255,255,255,0.5); font-size: 9px; letter-spacing: 0.1em; display: flex; align-items: center; justify-content: center; text-align: center; line-height: 1.2; }
  .radius-demo.active { border-color: #eaff00; color: #eaff00; }
  .radius-demo.filled { background: #ff2d87; border-color: #ff2d87; color: #000; }

/* ── checker motif (coral × blue) ── */
.chk{background-color:#ff6050;background-image:linear-gradient(45deg,#0a84e0 25%,transparent 25%,transparent 75%,#0a84e0 75%),linear-gradient(45deg,#0a84e0 25%,transparent 25%,transparent 75%,#0a84e0 75%);background-size:16px 16px;background-position:0 0,8px 8px}
.chk-strip{flex-basis:100%;grid-column:1/-1;height:7px;width:100%;margin-bottom:14px;background-color:#ff6050;background-image:linear-gradient(45deg,#0a84e0 25%,transparent 25%,transparent 75%,#0a84e0 75%),linear-gradient(45deg,#0a84e0 25%,transparent 25%,transparent 75%,#0a84e0 75%);background-size:14px 14px;background-position:0 0,7px 7px}
</style>
  <link rel="stylesheet" href="../glitch.css">
</head>
<body class="gl-stage">
<div class="chk-strip"></div>
  <div class="grid">
    <div class="section">// SPACING SCALE — 4PX BASE</div>
    <div class="row"><span class="label">sp-1</span><div class="track"><div class="fill" style="width:4px"></div></div><span class="val">4</span></div>
    <div class="row"><span class="label">sp-2</span><div class="track"><div class="fill" style="width:8px"></div></div><span class="val">8</span></div>
    <div class="row"><span class="label">sp-3</span><div class="track"><div class="fill" style="width:12px"></div></div><span class="val">12</span></div>
    <div class="row"><span class="label">sp-4</span><div class="track"><div class="fill" style="width:16px"></div></div><span class="val">16</span></div>
    <div class="row"><span class="label">sp-5</span><div class="track"><div class="fill" style="width:20px"></div></div><span class="val">20</span></div>
    <div class="row"><span class="label">sp-6</span><div class="track"><div class="fill" style="width:24px"></div></div><span class="val">24</span></div>
    <div class="row"><span class="label">sp-8</span><div class="track"><div class="fill" style="width:32px"></div></div><span class="val">32</span></div>
    <div class="row"><span class="label">sp-10</span><div class="track"><div class="fill" style="width:40px"></div></div><span class="val">40</span></div>
    <div class="row"><span class="label">sp-12</span><div class="track"><div class="fill" style="width:48px"></div></div><span class="val">48</span></div>
    <div class="row"><span class="label">sp-16</span><div class="track"><div class="fill" style="width:64px"></div></div><span class="val">64</span></div>

    <div class="section">// RADIUS — ALWAYS 0</div>
    <div class="radii">
      <div class="radius-demo">DEFAULT<br/>0px</div>
      <div class="radius-demo active">ACTIVE<br/>0px</div>
      <div class="radius-demo filled">FILLED<br/>0px</div>
    </div>
  </div>
<script src="../glitch.js"></script>
</body>
</html>
