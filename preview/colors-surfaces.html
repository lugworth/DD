<!DOCTYPE html>
<!-- @dsCard group="Colors" name="Surfaces & Borders" subtitle="Black scale, text opacities, borders" viewport="700x430" -->
<html>
<head>
<meta charset="UTF-8">
<style>
  
@font-face{font-family:'Geist Mono';src:url('../fonts/GeistMono-VariableFont_wght.ttf') format('truetype-variations');font-weight:100 900;font-style:normal;font-display:swap}
@font-face{font-family:'Red Hat Mono';src:url('../fonts/RedHatMono-VariableFont_wght.ttf') format('truetype-variations');font-weight:300 700;font-style:normal;font-display:swap}
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0a0a0a; padding: 16px; font-family: 'Geist Mono','Geist Mono','Red Hat Mono',monospace; }
  .row { display: grid; grid-template-columns: 130px 1fr 100px; align-items: center; height: 36px; border-bottom: 1px solid rgba(255,255,255,0.08); gap: 10px; padding: 0 2px; }
  .row:last-child { border-bottom: none; }
  .token { font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: rgba(255,255,255,0.5); }
  .bar { height: 20px; border: 1px solid rgba(255,255,255,0.15); }
  .hex { font-size: 10px; letter-spacing: 0.08em; color: rgba(255,255,255,0.6); text-align: right; }
  .section { font-size: 9px; letter-spacing: 0.2em; text-transform: uppercase; color: rgba(255,255,255,0.3); padding: 10px 0 4px; border-bottom: 1px solid rgba(255,255,255,0.08); }
  .section:first-child { padding-top: 0; }

/* ── checker motif (coral × blue) ── */
.chk{background-color:#ff6050;background-image:linear-gradient(45deg,#0a84e0 25%,transparent 25%,transparent 75%,#0a84e0 75%),linear-gradient(45deg,#0a84e0 25%,transparent 25%,transparent 75%,#0a84e0 75%);background-size:16px 16px;background-position:0 0,8px 8px}
.chk-strip{flex-basis:100%;grid-column:1/-1;height:7px;width:100%;margin-bottom:14px;background-color:#ff6050;background-image:linear-gradient(45deg,#0a84e0 25%,transparent 25%,transparent 75%,#0a84e0 75%),linear-gradient(45deg,#0a84e0 25%,transparent 25%,transparent 75%,#0a84e0 75%);background-size:14px 14px;background-position:0 0,7px 7px}
</style>
  <link rel="stylesheet" href="../glitch.css">
</head>
<body class="gl-stage">
<div class="chk-strip"></div>
  <div class="section">// SURFACES</div>
  <div class="row"><span class="token">--black</span><div class="bar" style="background:#000"></div><span class="hex">#000000</span></div>
  <div class="row"><span class="token">--black-soft</span><div class="bar" style="background:#0a0a0a"></div><span class="hex">#0a0a0a</span></div>
  <div class="row"><span class="token">--black-panel</span><div class="bar" style="background:#111110"></div><span class="hex">#111110</span></div>
  <div class="row"><span class="token">--black-raised</span><div class="bar" style="background:#1a1a18"></div><span class="hex">#1a1a18</span></div>

  <div class="section">// TEXT</div>
  <div class="row"><span class="token">--fg</span><div class="bar" style="background:#fff"></div><span class="hex">#ffffff</span></div>
  <div class="row"><span class="token">--fg-soft</span><div class="bar" style="background:rgba(255,255,255,0.86)"></div><span class="hex">86% white</span></div>
  <div class="row"><span class="token">--fg-dim</span><div class="bar" style="background:rgba(255,255,255,0.42)"></div><span class="hex">42% white</span></div>
  <div class="row"><span class="token">--fg-ghost</span><div class="bar" style="background:rgba(255,255,255,0.12); border-color: rgba(255,255,255,0.3)"></div><span class="hex">12% white</span></div>

  <div class="section">// BORDERS</div>
  <div class="row"><span class="token">--border</span><div class="bar" style="background:transparent; border-color: rgba(255,255,255,0.12)"></div><span class="hex">12% white</span></div>
  <div class="row"><span class="token">--border-hi</span><div class="bar" style="background:transparent; border-color: rgba(255,255,255,0.25)"></div><span class="hex">25% white</span></div>
  <div class="row"><span class="token">--border-solid</span><div class="bar" style="background:transparent; border-color:#fff"></div><span class="hex">#ffffff</span></div>
<script src="../glitch.js"></script>
</body>
</html>
