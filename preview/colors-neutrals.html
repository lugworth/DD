<!DOCTYPE html>
<html><head><meta charset="UTF-8"><style>

@font-face{font-family:'Geist Mono';src:url('../fonts/GeistMono-VariableFont_wght.ttf') format('truetype-variations');font-weight:100 900;font-style:normal;font-display:swap}
@font-face{font-family:'Red Hat Mono';src:url('../fonts/RedHatMono-VariableFont_wght.ttf') format('truetype-variations');font-weight:300 700;font-style:normal;font-display:swap}
*{box-sizing:border-box;margin:0;padding:0}
body{background:#000;padding:12px;font-family:'Geist Mono','Geist Mono','Red Hat Mono',monospace}
.grid{display:grid;grid-template-columns:repeat(6,1fr);gap:2px}
@media(max-width:560px){.grid{grid-template-columns:repeat(3,1fr)}}
.sw{height:60px;display:flex;flex-direction:column;justify-content:flex-end;padding:6px 8px;border:1px solid rgba(255,255,255,.1)}
.sw .n{font-size:9px;text-transform:uppercase;letter-spacing:.1em;line-height:1.2;font-weight:700}
.sw .h{font-size:8px;opacity:.5;letter-spacing:.05em}
.light .n,.light .h{color:#fff}.dark .n,.dark .h{color:#000}
.sect{grid-column:1/-1;font-size:9px;text-transform:uppercase;letter-spacing:.2em;color:rgba(255,255,255,.35);padding:10px 0 2px}

/* ── checker motif (coral × blue) ── */
.chk{background-color:#ff6050;background-image:linear-gradient(45deg,#2d4cff 25%,transparent 25%,transparent 75%,#2d4cff 75%),linear-gradient(45deg,#2d4cff 25%,transparent 25%,transparent 75%,#2d4cff 75%);background-size:16px 16px;background-position:0 0,8px 8px}
.chk-strip{flex-basis:100%;grid-column:1/-1;height:7px;width:100%;margin-bottom:14px;background-color:#ff6050;background-image:linear-gradient(45deg,#2d4cff 25%,transparent 25%,transparent 75%,#2d4cff 75%),linear-gradient(45deg,#2d4cff 25%,transparent 25%,transparent 75%,#2d4cff 75%);background-size:14px 14px;background-position:0 0,7px 7px}
</style>  <link rel="stylesheet" href="../glitch.css">
</head><body class="gl-stage">
<div class="chk-strip"></div>
<div class="grid">
  <div class="sect">— BASE / SURFACES</div>
  <div class="sw light" style="background:#000000"><span class="n">black</span><span class="h">#000000</span></div>
  <div class="sw light" style="background:#0a0a0a"><span class="n">black-soft</span><span class="h">#0a0a0a</span></div>
  <div class="sw light" style="background:#111110"><span class="n">black-panel</span><span class="h">#111110</span></div>
  <div class="sw light" style="background:#1a1a18"><span class="n">black-raised</span><span class="h">#1a1a18</span></div>
  <div class="sw dark" style="background:#ffffff"><span class="n">white</span><span class="h">#ffffff</span></div>
  <div class="sw light" style="background:#000;border:1px solid rgba(255,255,255,.12);"><span class="n" style="color:#fff">border</span><span class="h" style="color:rgba(255,255,255,.5)">white/12%</span></div>

  <div class="sect">— FOREGROUND STEPS (white alpha)</div>
  <div class="sw dark" style="background:#ffffff"><span class="n">fg</span><span class="h">100%</span></div>
  <div class="sw dark" style="background:rgba(255,255,255,.86)"><span class="n">fg-soft</span><span class="h">86%</span></div>
  <div class="sw light" style="background:rgba(255,255,255,.42)"><span class="n">fg-dim</span><span class="h">42%</span></div>
  <div class="sw light" style="background:rgba(255,255,255,.12)"><span class="n">fg-ghost</span><span class="h">12%</span></div>
  <div class="sw light" style="background:#000;border:1px solid rgba(255,255,255,.12);"><span class="n" style="color:#fff">ex. on black</span><span class="h" style="color:rgba(255,255,255,.4)">sample</span></div>
  <div class="sw dark" style="background:#eaff00"><span class="n">on yellow</span><span class="h">fg = #000</span></div>
</div>
<script src="../glitch.js"></script>
</body></html>
