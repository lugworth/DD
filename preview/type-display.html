<!DOCTYPE html>
<!-- @dsCard group="Type" name="Display Type" subtitle="Space Grotesk — hero scale, uppercase tracked" viewport="700x460" -->
<html>
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap');
@font-face{font-family:'Geist Mono';src:url('../fonts/GeistMono-VariableFont_wght.ttf') format('truetype-variations');font-weight:100 900;font-style:normal;font-display:swap}
@font-face{font-family:'Red Hat Mono';src:url('../fonts/RedHatMono-VariableFont_wght.ttf') format('truetype-variations');font-weight:300 700;font-style:normal;font-display:swap}
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #000; padding: 16px; font-family: 'Space Grotesk', sans-serif; color: #fff; overflow-x: hidden; }
  .row { display: grid; grid-template-columns: 90px 1fr; gap: 14px; padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.08); align-items: baseline; }
  .row:last-child { border-bottom: none; }
  .meta { font-family: 'Geist Mono','Geist Mono','Red Hat Mono',monospace; font-size: 9px; letter-spacing: 0.15em; text-transform: uppercase; color: rgba(255,255,255,0.35); line-height: 1.4; }
  .spec { line-height: 0.95; font-weight: 900; text-transform: uppercase; letter-spacing: -0.02em; }
  .acc-y { color: #eaff00; }
  .acc-p { color: #ff2d87; }

/* ── checker motif (coral × blue) ── */
.chk{background-color:#ff6050;background-image:linear-gradient(45deg,#0a84e0 25%,transparent 25%,transparent 75%,#0a84e0 75%),linear-gradient(45deg,#0a84e0 25%,transparent 25%,transparent 75%,#0a84e0 75%);background-size:16px 16px;background-position:0 0,8px 8px}
.chk-strip{flex-basis:100%;grid-column:1/-1;height:7px;width:100%;margin-bottom:14px;background-color:#ff6050;background-image:linear-gradient(45deg,#0a84e0 25%,transparent 25%,transparent 75%,#0a84e0 75%),linear-gradient(45deg,#0a84e0 25%,transparent 25%,transparent 75%,#0a84e0 75%);background-size:14px 14px;background-position:0 0,7px 7px}
</style>
  <link rel="stylesheet" href="../glitch.css">
</head>
<body class="gl-stage">
<div class="chk-strip"></div>
  <div class="row"><div class="meta">display / 120px<br/>900 / -2% ls</div><div class="spec gl-text" style="font-size:120px;">DIGI<span class="acc-y">DEL</span>IC</div></div>
  <div class="row"><div class="meta">h2 / 80px<br/>900</div><div class="spec" style="font-size:80px;">SECTOR <span class="acc-y">A1.2</span></div></div>
  <div class="row"><div class="meta">h3 / 56px<br/>900</div><div class="spec" style="font-size:56px;">RUN <span class="acc-p">SEQUENCE</span></div></div>
  <div class="row"><div class="meta">h4 / 40px<br/>900</div><div class="spec" style="font-size:40px; letter-spacing:0;">SIGNAL AUTHENTICATED</div></div>
  <div class="row"><div class="meta">h5 / 28px<br/>700 / +6% ls</div><div class="spec" style="font-size:28px; font-weight:700; letter-spacing:0.06em; color:rgba(255,255,255,0.86);">INITIALIZE · AWAITING INPUT</div></div>
  <div class="row"><div class="meta">h6 / 20px<br/>700 / +12%</div><div class="spec" style="font-size:20px; font-weight:700; letter-spacing:0.12em; color:rgba(255,255,255,0.42);">VECTOR-CLASS FREELANCE</div></div>
<script src="../glitch.js"></script>
</body>
</html>
