/* ============================================================
   digidelic — GLITCH LAYER (shared) · v2 fine-grain
   Drop-in: <link rel="stylesheet" href="../glitch.css">

/* ---- 1. STAGE: fine scanlines + sub-pixel RGB mask + soft flicker ---- */
.gl-stage { position: relative; }

/* high-density scanlines + vertical aperture-grille mask + faint chroma edge */
.gl-stage::before {
  content:''; position: fixed; inset: 0; pointer-events: none; z-index: 9998;
  background:
    /* horizontal scanlines — 1px line every 3px, low contrast */
    repeating-linear-gradient(0deg, rgba(0,0,0,0.10) 0 1px, rgba(0,0,0,0) 1px 3px),
    /* vertical sub-pixel grille — softens edges, reads as "screen" not "blocks" */
    repeating-linear-gradient(90deg, rgba(255,45,135,0.025) 0 1px, rgba(0,217,255,0.025) 1px 2px, rgba(0,0,0,0) 2px 3px),
    /* faint chroma fringe at the bezel */
    linear-gradient(90deg, rgba(255,45,135,0.035), transparent 5%, transparent 95%, rgba(0,217,255,0.035));
  mix-blend-mode: screen;
}
/* rolling band + gentle flicker — smooth, not stepped */
.gl-stage::after {
  content:''; position: fixed; inset: 0; pointer-events: none; z-index: 9999;
  background: linear-gradient(180deg, transparent, rgba(255,255,255,0.03) 50%, transparent);
  height: 26%;
  animation: gl-roll 7s linear infinite, gl-flicker 5s ease-in-out infinite;
}
@keyframes gl-roll   { 0%{ transform: translateY(-40%);} 100%{ transform: translateY(420%);} }
@keyframes gl-flicker{ 0%,100%{opacity:.85} 18%{opacity:.7} 33%{opacity:.92} 52%{opacity:.6} 71%{opacity:.88} 88%{opacity:.75} }

/* periodic whole-card slip (frame-tear) — sub-pixel, fast, toggled by JS */
.gl-stage[data-gl-tear="1"] { animation: gl-tear .12s linear; }
@keyframes gl-tear {
  0%{ transform: translate(0,0) }
  30%{ transform: translate(-0.6px,0.4px) }
  60%{ transform: translate(0.5px,-0.4px) }
  100%{ transform: translate(0,0) }
}

/* ---- 2. RGB SPLIT for any element (add class gl-rgb + data-text) ---- */
.gl-rgb { position: relative; }
.gl-rgb::before, .gl-rgb::after {
  content: attr(data-text); position: absolute; inset: 0;
  pointer-events: none; opacity: .55;
}
/* finer clip bands (more of them = less "halved" look), tiny smooth offsets */
.gl-rgb::before { color:#ff2d87; animation: gl-shX 3.2s ease-in-out infinite; clip-path: polygon(0 0,100% 0,100% 33%,0 33%); }
.gl-rgb::after  { color:#00d9ff; animation: gl-shY 3.8s ease-in-out infinite; clip-path: polygon(0 67%,100% 67%,100% 100%,0 100%); }

/* ---- 3. TEXT JITTER — fine constant chromatic fringe (sub-pixel) ---- */
.gl-text {
  text-shadow: 0.5px 0 rgba(255,45,135,0.45), -0.5px 0 rgba(0,217,255,0.45);
  animation: gl-jit 4.5s ease-in-out infinite;
}
@keyframes gl-jit {
  0%,100%{ text-shadow: 0.5px 0 rgba(255,45,135,.45), -0.5px 0 rgba(0,217,255,.45) }
  46%{ text-shadow: 0.8px 0 rgba(255,45,135,.55), -0.8px 0 rgba(0,217,255,.5) }
  50%{ text-shadow: -0.6px 0 rgba(255,45,135,.6), 1px 0 rgba(0,217,255,.45) }
  54%{ text-shadow: 0.5px 0 rgba(255,45,135,.45), -0.5px 0 rgba(0,217,255,.45) }
}

/* ---- 4. MICRO-SLICE — thin scanline-height tears (not big blocks) ---- */
.gl-slice { position: relative; }
.gl-slice[data-gl-tear="1"]::before,
.gl-slice[data-gl-tear="1"]::after {
  content:''; position:absolute; left:0; right:0; pointer-events:none;
  height: 2px; mix-blend-mode: screen; opacity:.5;
}
.gl-slice[data-gl-tear="1"]::before {
  top: var(--gl-slice-top, 28%);
  background: rgba(0,217,255,0.9);
  transform: translateX(var(--gl-slice-x, 3px));

/* ---- 5. NOISE grain overlay helper — fine, animated ---- */
.gl-noise { position: relative; }
.gl-noise::after {
  content:''; position:absolute; inset:0; pointer-events:none; z-index:1; opacity:.05;
  background-image: radial-gradient(circle, #fff 0.4px, transparent 0.5px);

  0%{background-position:0 0} 25%{background-position:-1px 1px}
  50%{background-position:1px -1px} 75%{background-position:-1px -1px} 100%{background-position:1px 1px}
}

@media (prefers-reduced-motion: reduce) {
  .gl-stage::after, .gl-rgb::before, .gl-rgb::after, .gl-text, .gl-noise::after { animation: none; }

}

/* ============================================================
   6. TEXTURE OVERLAYS — sampled image refs as ambient layers
   Robust pattern: a real positioned child, not a pseudo-element,
   so it renders in every browser AND in thumbnail captures.
   Usage:
     <div class="tex-host">

.tex-host { position: relative; }
.tex-host > *:not(.tex) { position: relative; z-index: 1; }

.tex {

/* ============================================================

.psy-swirl {
  position: absolute; pointer-events: none; border-radius: 50%;
  background: repeating-radial-gradient(circle at 50% 50%, transparent 0 6px, currentColor 6px 6.6px, transparent 6.6px 13px);

.psy-aura {
  position: absolute; top: -10%; left: 50%; width: 40%; height: 120%;
  transform: translateX(-50%); pointer-events: none;

.psy-aura-thin { width: 14%; filter: blur(9px); opacity: .7; }

/* flowing rainbow gradient — fill (bars/strips) */
@keyframes psy-grad-pan { 0%{background-position:0% 50%} 100%{background-position:300% 50%} }
.psy-rainbow {
  background: linear-gradient(90deg,#eaff00,#39ff6a,#00d9ff,#2d4cff,#c800ff,#ff2d87,#ff6050,#ff5a00,#eaff00);
  background-size: 300% 100%;

.psy-text {
  background: linear-gradient(90deg,#eaff00,#39ff6a,#00d9ff,#c800ff,#ff2d87,#ff6050,#eaff00);
  background-size: 300% 100%;
  -webkit-background-clip: text; background-clip: text;
  -webkit-text-fill-color: transparent; color: transparent;
  animation: psy-grad-pan 6s linear infinite;

/* chromatic-aberration pulse */
@keyframes psy-aberr { 0%,100%{text-shadow:-1px 0 #ff2d87, 1px 0 #00d9ff} 50%{text-shadow:-2px 0 #ff2d87, 2px 0 #00d9ff} }

  0%,100% { transform: skewX(-7deg) skewY(1.2deg) translateY(0)   scaleY(1); }
  25%     { transform: skewX(5deg)  skewY(-1.4deg) translateY(-3px) scaleY(1.05); }
  50%     { transform: skewX(8deg)  skewY(1deg)   translateY(2px)  scaleY(.96); }
  75%     { transform: skewX(-4deg) skewY(-0.8deg) translateY(-2px) scaleY(1.04); }
}
.psy-undulate { animation: psy-undulate 7s ease-in-out infinite; transform-origin: center; }

/* wavy ribbon — background-position sine pan + vertical wobble */
@keyframes psy-ribbon {
  0%   { background-position:0% 50%;   transform: translateY(0)   skewY(-1.5deg); }
  50%  { background-position:150% 50%; transform: translateY(-2px) skewY(1.5deg); }
  100% { background-position:300% 50%; transform: translateY(0)   skewY(-1.5deg); }

.psy-ribbon { background-size:300% 100%; animation: psy-ribbon 6s ease-in-out infinite; }

    animation: none !important;
  }

      '<filter id="psyWaveXL">' +
        '<feTurbulence type="turbulence" baseFrequency="0.0015 0.012" numOctaves="2" seed="9" result="wx">' +
          '<animate attributeName="baseFrequency" dur="13s" values="0.0015 0.012;0.005 0.03;0.0015 0.012" repeatCount="indefinite"/>' +
        '</feTurbulence>' +
        '<feDisplacementMap in="SourceGraphic" in2="wx" scale="120" xChannelSelector="R" yChannelSelector="G">' +
          '<animate attributeName="scale" dur="10s" values="70;150;70" repeatCount="indefinite"/>' +
        '</feDisplacementMap>' +
      '</filter>' +
      '</defs>';
    (document.body || document.documentElement).appendChild(svg);
  }

  if (window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;
  var stage = document.querySelector('.gl-stage') || document.body;
  var slices = document.querySelectorAll('.gl-slice');

  function rand(a, b) { return a + Math.random() * (b - a); }

  function burst() {
    stage.setAttribute('data-gl-tear', '1');
    slices.forEach(function (el) {
      el.style.setProperty('--gl-slice-top',  rand(12, 80).toFixed(1) + '%');
      el.style.setProperty('--gl-slice-top2', rand(12, 80).toFixed(1) + '%');
      el.style.setProperty('--gl-slice-x',  rand(-4, 4).toFixed(1) + 'px');
      el.style.setProperty('--gl-slice-x2', rand(-3, 3).toFixed(1) + 'px');
      el.setAttribute('data-gl-tear', '1');
    });
    // very short flash so it reads as a fine artifact, not a block
    setTimeout(function () {
      stage.removeAttribute('data-gl-tear');
      slices.forEach(function (el) { el.removeAttribute('data-gl-tear'); });
    }, 70 + Math.random() * 80);

    // occasional quick double-tap for a stutter feel
    if (Math.random() < 0.35) {
      setTimeout(function () {
        stage.setAttribute('data-gl-tear', '1');
        setTimeout(function () { stage.removeAttribute('data-gl-tear'); }, 50);
      }, 140);
    }
    schedule();
  }
  function schedule() {
    setTimeout(burst, 2600 + Math.random() * 5000);
  }
  schedule();
})();

</script>
</body></html>
